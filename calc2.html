<body>
    <script>
        let curValue = 0;
        let operator ='';
        let joat =0;
        let count = 0;

        function numberButton(num){
            if (document.getElementById('display1').innerHTML=='0'||document.getElementById('display2').innerHTML=='0'){
                document.getElementById('display1').innerHTML = num;
                document.getElementById('display2').innerHTML = num;
            }
            else{
                document.getElementById('display1').innerHTML += num;
                document.getElementById('display2').innerHTML += num;
            }
        }
     

        function percentageButton(){
            curValue = (parseFloat(document.getElementById("display1").innerHTML))/100;
            document.getElementById('display1').innerHTML = curValue;
            
            curValue = (parseFloat(document.getElementById("display2").innerHTML))/100;
            document.getElementById('display2').innerHTML = curValue;
        }
        function dot(){
            document.getElementById('display1').innerHTML += '.';
            document.getElementById('display2').innerHTML += '.';
        }
        function reset11(){
            document.getElementById('display1').innerHTML = '0';
            document.getElementById('display2').innerHTML = '0';
        }
        function sqrtButton(){
            curValue = parseFloat(document.getElementById("display1").innerHTML);
            curValue = parseFloat(document.getElementById("display2").innerHTML);
            curValue = Math.sqrt(curValue);
            document.getElementById('display1').innerHTML = curValue;
            document.getElementById('display2').innerHTML = curValue;

        }
        function PieButton(){
            curValue = parseFloat(document.getElementById("display1").innerHTML);
            curValue = parseFloat(document.getElementById("display2").innerHTML);
            curValue = 3.1415926536;
            document.getElementById('display1').innerHTML = curValue;
            document.getElementById('display2').innerHTML = curValue;
        }
        function SquareButton(){
            curValue = parseFloat(document.getElementById("display1").innerHTML);
            curValue = parseFloat(document.getElementById("display2").innerHTML);
            curValue = curValue*curValue;
            document.getElementById('display1').innerHTML = curValue;
            document.getElementById('display2').innerHTML = curValue;
        }
        function R0Button(){
            curValue = parseFloat(document.getElementById("display1").innerHTML);
            curValue = parseFloat(document.getElementById("display2").innerHTML);
            curValue = Math.floor(curValue);
            document.getElementById('display1').innerHTML = curValue;
            document.getElementById('display2').innerHTML = curValue;
        }
        function R2Button(){
            curValue = parseFloat(document.getElementById("display1").innerHTML);
            curValue = parseFloat(document.getElementById("display2").innerHTML);
            curValue = curValue.toFixed(2);
            document.getElementById('display1').innerHTML = curValue;
            document.getElementById('display2').innerHTML = curValue;
        }
        function changeButton(){
            curValue = parseFloat(document.getElementById("display1").innerHTML);
            curValue = parseFloat(document.getElementById("display2").innerHTML);
            curValue = curValue*(-1);
            document.getElementById('display1').innerHTML = curValue;
            document.getElementById('display2').innerHTML = curValue;
        }



        function plusButton(){
            curValue = parseFloat(document.getElementById("display1").innerHTML);
            curValue = parseFloat(document.getElementById("display2").innerHTML);
            document.getElementById("display1").innerHTML = 0;
            document.getElementById("display2").innerHTML = 0;
            operator ='+';
            count = 0;
        }
        function minusButton(){
            curValue = parseFloat(document.getElementById("display1").innerHTML);
            curValue = parseFloat(document.getElementById("display2").innerHTML);
            document.getElementById("display1").innerHTML = 0;
            document.getElementById("display2").innerHTML = 0;
            operator ='-';
            count = 0;
        }
        function multiButton(){
            curValue = parseFloat(document.getElementById("display1").innerHTML);
            curValue = parseFloat(document.getElementById("display2").innerHTML);
            document.getElementById("display1").innerHTML = 0;
            document.getElementById("display2").innerHTML = 0;
            operator ='x';
            count = 0;

        }
        function divisionButton(){
            curValue = parseFloat(document.getElementById("display1").innerHTML);
            curValue = parseFloat(document.getElementById("display2").innerHTML);
            document.getElementById("display1").innerHTML = 0;
            document.getElementById("display2").innerHTML = 0;
            operator ='/';
            count = 0;
        }
        

    

        function equalButton(){
            if (count == 0){
                joat = parseFloat(document.getElementById("display1").innerHTML);
                count = 1;
            }
            if(operator =='+'){
                curValue += joat;
            }
            else if(operator=='-'){
                curValue -= joat;
            }
            else if(operator=='x'){
                curValue *= joat;
            }
            else if(operator=='/'){
                curValue /= joat;
            }
            else{

            }
            document.getElementById('display1').innerHTML = curValue;
            document.getElementById('display2').innerHTML = curValue;
        }
        
        
    </script>

                <td><button class="ButtonStyle2" onclick="numberButton(9)">9</button></td>
                <td><button class="ButtonStyle3" onclick="multiButton()">x</button></td>
